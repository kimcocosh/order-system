<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>옥수주조 관리자</title>
  <script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green: #2d6a4f;
      --green-light: #40916c;
      --green-pale: #d8f3dc;
      --red: #e63946;
      --red-pale: #ffeaea;
      --orange: #fd7e14;
      --yellow-pale: #fff3cd;
      --gray: #6c757d;
      --gray-light: #f8f9fa;
      --border: #dee2e6;
      --radius: 10px;
      --shadow: 0 2px 8px rgba(0,0,0,.08);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Noto Sans KR', sans-serif;
      background: #f0f4f1;
      color: #212529;
      min-height: 100vh;
    }

    /* ── 로그인 화면 ── */
    .login-wrap {
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh;
    }
    .login-box {
      background: #fff;
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 40px 32px;
      width: 100%; max-width: 340px;
      text-align: center;
    }
    .login-box h1 { font-size: 1.3rem; color: var(--green); margin-bottom: 6px; }
    .login-box p  { color: var(--gray); font-size: .85rem; margin-bottom: 24px; }
    .login-box input {
      width: 100%; padding: 12px 14px;
      border: 2px solid var(--border); border-radius: 8px;
      font-size: 1rem; margin-bottom: 12px;
    }
    .login-box input:focus { outline: none; border-color: var(--green); }
    .login-box .btn-login {
      width: 100%; padding: 13px;
      background: var(--green); color: #fff;
      border: none; border-radius: 8px;
      font-size: 1rem; font-weight: 700; cursor: pointer;
    }
    .login-box .btn-login:hover { background: var(--green-light); }
    .login-error { color: var(--red); font-size: .85rem; margin-top: 8px; }

    /* ── 레이아웃 ── */
    #dashboard { display: none; min-height: 100vh; }

    .top-bar {
      background: var(--green);
      color: #fff;
      padding: 14px 20px;
      display: flex; align-items: center; justify-content: space-between;
      position: sticky; top: 0; z-index: 100;
      box-shadow: 0 2px 8px rgba(0,0,0,.2);
    }
    .top-bar h1 { font-size: 1.1rem; }
    .top-bar .refresh-btn {
      background: rgba(255,255,255,.2);
      border: none; color: #fff;
      padding: 6px 14px; border-radius: 6px;
      cursor: pointer; font-size: .85rem;
    }
    .top-bar .refresh-btn:hover { background: rgba(255,255,255,.3); }

    /* ── 탭 ── */
    .tabs {
      display: flex;
      background: #fff;
      border-bottom: 2px solid var(--border);
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }
    .tab-btn {
      flex: 1; min-width: 80px;
      padding: 13px 8px;
      border: none; background: none;
      font-size: .82rem; font-weight: 600;
      color: var(--gray); cursor: pointer;
      white-space: nowrap;
      border-bottom: 3px solid transparent;
      margin-bottom: -2px;
      transition: color .2s;
    }
    .tab-btn.active { color: var(--green); border-bottom-color: var(--green); }
    .tab-btn:hover { color: var(--green-light); }

    .tab-panel { display: none; padding: 16px; max-width: 900px; margin: 0 auto; }
    .tab-panel.active { display: block; }

    /* ── 공통 카드 ── */
    .card {
      background: #fff; border-radius: var(--radius);
      box-shadow: var(--shadow); margin-bottom: 14px; overflow: hidden;
    }
    .card-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 16px;
      background: var(--green-pale);
      border-bottom: 1px solid #b7e4c7;
    }
    .card-header h3 { color: var(--green); font-size: .95rem; }

    /* ── 버튼 ── */
    .btn {
      padding: 8px 16px; border: none; border-radius: 7px;
      font-size: .85rem; font-weight: 600; cursor: pointer;
      transition: opacity .2s;
    }
    .btn:hover { opacity: .85; }
    .btn-green  { background: var(--green); color: #fff; }
    .btn-outline { background: #fff; color: var(--green); border: 2px solid var(--green); }
    .btn-red    { background: var(--red); color: #fff; }
    .btn-gray   { background: #e9ecef; color: #212529; }
    .btn-sm { padding: 5px 10px; font-size: .78rem; }

    /* ── 통계 배지 ── */
    .stat-row { display: flex; gap: 10px; margin-bottom: 14px; flex-wrap: wrap; }
    .stat-card {
      flex: 1; min-width: 100px;
      background: #fff; border-radius: var(--radius);
      box-shadow: var(--shadow); padding: 14px 16px;
      text-align: center;
    }
    .stat-card .num { font-size: 1.8rem; font-weight: 800; color: var(--green); }
    .stat-card .lbl { font-size: .78rem; color: var(--gray); margin-top: 2px; }

    /* ── 주문 카드 ── */
    .order-card {
      background: #fff; border-radius: var(--radius);
      box-shadow: var(--shadow); margin-bottom: 10px;
      overflow: hidden; border-left: 4px solid var(--green);
    }
    .order-card.done { border-left-color: var(--gray); opacity: .7; }
    .order-head {
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 14px; gap: 8px; flex-wrap: wrap;
    }
    .order-name { font-weight: 700; font-size: .95rem; }
    .order-time { font-size: .78rem; color: var(--gray); }
    .order-body { padding: 0 14px 12px; }
    .order-items { font-size: .88rem; color: #444; line-height: 1.7; }
    .order-note  { font-size: .82rem; color: var(--gray); margin-top: 4px; }

    .status-badge {
      padding: 3px 10px; border-radius: 20px;
      font-size: .75rem; font-weight: 700;
    }
    .status-badge.pending   { background: #fff3cd; color: #664d03; }
    .status-badge.done      { background: var(--green-pale); color: var(--green); }
    .status-badge.cancelled  { background: #e9ecef; color: var(--gray); }
    .status-badge.confirmed  { background: #cfe2ff; color: #0d6efd; }

    /* ── 필터 행 ── */
    .filter-row { display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; }
    .filter-btn {
      padding: 6px 14px; border-radius: 20px;
      border: 2px solid var(--border);
      background: #fff; color: var(--gray);
      font-size: .82rem; font-weight: 600; cursor: pointer;
    }
    .filter-btn.active { background: var(--green); color: #fff; border-color: var(--green); }

    /* ── 재고 테이블 ── */
    .stock-grid { padding: 4px 0; }
    .stock-row {
      display: flex; align-items: center; gap: 12px;
      padding: 10px 16px; border-bottom: 1px solid var(--border);
    }
    .stock-row:last-child { border-bottom: none; }
    .stock-name { flex: 1; font-weight: 600; font-size: .92rem; }
    .stock-input {
      width: 80px; padding: 7px 10px;
      border: 2px solid var(--border); border-radius: 7px;
      font-size: .95rem; text-align: center; font-weight: 700;
    }
    .stock-input:focus { outline: none; border-color: var(--green); }
    .stock-input.zero { border-color: var(--red); color: var(--red); }

    /* ── 상품 관리 ── */
    .product-row {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 16px; border-bottom: 1px solid var(--border);
    }
    .product-row:last-child { border-bottom: none; }
    .product-name-input {
      flex: 1; padding: 7px 10px;
      border: 1px solid var(--border); border-radius: 7px;
      font-size: .88rem;
    }
    .product-name-input:focus { outline: none; border-color: var(--green); }
    .toggle-btn {
      padding: 5px 12px; border-radius: 6px; border: none;
      font-size: .78rem; font-weight: 700; cursor: pointer;
    }
    .toggle-btn.on  { background: var(--green-pale); color: var(--green); }
    .toggle-btn.off { background: #e9ecef; color: var(--gray); }

    .add-product-row {
      display: flex; gap: 8px; padding: 12px 16px;
      border-top: 2px dashed var(--border);
    }
    .add-product-row input {
      flex: 1; padding: 8px 12px;
      border: 2px solid var(--border); border-radius: 7px;
      font-size: .88rem;
    }
    .add-product-row input:focus { outline: none; border-color: var(--green); }

    /* ── 멘트 템플릿 ── */
    .template-select {
      width: 100%; padding: 10px 14px;
      border: 2px solid var(--border); border-radius: 8px;
      font-size: .9rem; margin-bottom: 12px;
    }
    .template-select:focus { outline: none; border-color: var(--green); }
    .template-textarea {
      width: 100%; padding: 14px;
      border: 2px solid var(--border); border-radius: 8px;
      font-size: .9rem; font-family: inherit;
      min-height: 140px; resize: none; line-height: 1.7;
    }
    .template-textarea:focus { outline: none; border-color: var(--green); }
    .date-input {
      width: 100%; padding: 9px 14px;
      border: 2px solid var(--border); border-radius: 8px;
      font-size: .9rem; margin-bottom: 10px;
    }
    .date-input:focus { outline: none; border-color: var(--green); }
    .copy-toast {
      display: none;
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
      background: #212529; color: #fff;
      padding: 10px 20px; border-radius: 20px; font-size: .88rem;
      z-index: 999;
    }

    /* ── 다운로드 버튼 행 ── */
    .action-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 12px; }

    /* ── 캘린더 ── */
    .cal-head { font-size:.75rem; font-weight:700; color:var(--gray); padding:6px 0; }
    .cal-day {
      border-radius:8px; padding:6px 4px; min-height:52px;
      cursor:pointer; transition:background .15s;
      display:flex; flex-direction:column; align-items:center; gap:2px;
    }
    .cal-day:hover { background:var(--green-pale); }
    .cal-day.today { background:#e8f5e9; }
    .cal-day.selected { background:var(--green); color:#fff; }
    .cal-day.selected .cal-badge { background:#fff; color:var(--green); }
    .cal-day.other-month { opacity:.35; }
    .cal-day.empty { cursor:default; }
    .cal-day.empty:hover { background:none; }
    .cal-num { font-size:.85rem; font-weight:700; }
    .cal-badge {
      background:var(--green); color:#fff;
      border-radius:10px; font-size:.7rem; font-weight:700;
      padding:1px 6px; min-width:18px;
    }
    .cal-deadline { font-size:.62rem; color:var(--orange); font-weight:700; }
    .cal-day.selected .cal-deadline { color:#ffe082; }

    /* ── 빈 상태 ── */
    .empty-state {
      text-align: center; padding: 40px 20px;
      color: var(--gray); font-size: .9rem;
    }
    .empty-state .icon { font-size: 2.5rem; margin-bottom: 10px; }

    /* ── 모바일 대응 ── */
    @media (max-width: 480px) {
      .tab-panel { padding: 10px; }
      .order-head { gap: 6px; }
    }
  </style>
</head>
<body>

<!-- ── 로그인 ─────────────────────────────────────── -->
<div id="login-screen" class="login-wrap">
  <div class="login-box">
    <h1>🍶 옥수주조</h1>
    <p>관리자 대시보드</p>
    <input type="password" id="pw-input" placeholder="비밀번호 입력"
      onkeydown="if(event.key==='Enter')doLogin()" />
    <button class="btn-login" onclick="doLogin()">로그인</button>
    <div class="login-error" id="login-error"></div>
  </div>
</div>

<!-- ── 대시보드 ────────────────────────────────────── -->
<div id="dashboard">
  <div class="top-bar">
    <h1>🍶 옥수주조 관리자</h1>
    <button class="refresh-btn" onclick="refreshAll()">🔄 새로고침</button>
  </div>

  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('orders')">📋 주문 현황</button>
    <button class="tab-btn" onclick="switchTab('calendar')">📅 캘린더</button>
    <button class="tab-btn" onclick="switchTab('stock')">📦 재고 관리</button>
    <button class="tab-btn" onclick="switchTab('products')">🏷️ 상품 관리</button>
    <button class="tab-btn" onclick="switchTab('template')">💬 멘트 템플릿</button>
  </div>

  <!-- ── 주문 현황 탭 ── -->
  <div class="tab-panel active" id="tab-orders">

    <!-- 날짜 네비게이션 -->
    <div style="display:flex;align-items:center;justify-content:center;gap:12px;margin-bottom:12px;background:#fff;border-radius:var(--radius);padding:12px;box-shadow:var(--shadow)">
      <button class="btn btn-outline btn-sm" onclick="moveDate(-1)">◀</button>
      <span id="view-date-label" style="font-weight:700;font-size:1rem;min-width:110px;text-align:center"></span>
      <button class="btn btn-outline btn-sm" onclick="moveDate(1)">▶</button>
      <button class="btn btn-gray btn-sm" onclick="goToday()">오늘</button>
    </div>

    <!-- 통계 -->
    <div class="stat-row">
      <div class="stat-card"><div class="num" id="stat-today">0</div><div class="lbl">해당일 주문</div></div>
      <div class="stat-card"><div class="num" id="stat-pending">0</div><div class="lbl">미처리</div></div>
      <div class="stat-card"><div class="num" id="stat-confirmed">0</div><div class="lbl" style="color:#0d6efd">주문확인</div></div>
      <div class="stat-card"><div class="num" id="stat-done">0</div><div class="lbl">처리완료</div></div>
    </div>

    <!-- 액션 버튼 -->
    <div class="action-row">
      <button class="btn btn-green" onclick="downloadCJ()">📥 CJ택배 송장 엑셀</button>
      <button class="btn btn-outline" onclick="showEntaxModal()">📊 엔텍스 거래내역</button>
      <button class="btn btn-outline" onclick="showAlchanModal()">📗 알찬회계 엑셀</button>
      <button class="btn btn-outline" onclick="showManualOrderModal()" style="border-color:var(--orange);color:var(--orange)">✏️ 수동 주문 입력</button>
    </div>

    <!-- 필터 -->
    <div class="filter-row">
      <button class="filter-btn active" onclick="setFilter('all',this)">전체</button>
      <button class="filter-btn" onclick="setFilter('미처리',this)">미처리</button>
      <button class="filter-btn" onclick="setFilter('주문확인',this)">주문확인</button>
      <button class="filter-btn" onclick="setFilter('처리완료',this)">처리완료</button>
      <button class="filter-btn" id="filter-all-pending" onclick="setFilter('전체미처리',this)" style="border-color:var(--red);color:var(--red)">🔴 전체 미처리</button>
    </div>

    <div id="order-list"></div>
  </div>

  <!-- ── 캘린더 탭 ── -->
  <div class="tab-panel" id="tab-calendar">
    <div class="card">
      <div class="card-header" style="justify-content:space-between">
        <button class="btn btn-outline btn-sm" onclick="calMove(-1)">◀ 이전달</button>
        <h3 id="cal-title" style="font-size:1rem"></h3>
        <button class="btn btn-outline btn-sm" onclick="calMove(1)">다음달 ▶</button>
      </div>
      <div style="padding:12px">
        <div id="cal-grid" style="display:grid;grid-template-columns:repeat(7,1fr);gap:4px;text-align:center"></div>
      </div>
    </div>
    <div id="cal-day-orders" style="display:none">
      <div class="card-header" style="border-radius:var(--radius) var(--radius) 0 0;background:var(--green-pale)">
        <h3 id="cal-day-title" style="color:var(--green);font-size:.95rem"></h3>
      </div>
      <div id="cal-day-list" style="background:#fff;border-radius:0 0 var(--radius) var(--radius);box-shadow:var(--shadow)"></div>
    </div>
  </div>

  <!-- ── 재고 관리 탭 ── -->
  <div class="tab-panel" id="tab-stock">
    <div class="card">
      <div class="card-header">
        <h3>📦 재고 수량 관리</h3>
        <button class="btn btn-green btn-sm" onclick="saveStock()">💾 저장</button>
      </div>
      <div class="stock-grid" id="stock-grid"></div>
    </div>
  </div>

  <!-- ── 상품 관리 탭 ── -->
  <div class="tab-panel" id="tab-products">
    <div class="card">
      <div class="card-header">
        <h3>🏷️ 상품 목록</h3>
        <button class="btn btn-green btn-sm" onclick="saveProducts()">💾 저장</button>
      </div>
      <div id="product-list"></div>
      <div class="add-product-row">
        <input type="text" id="new-product-name" placeholder="새 품목명 입력" />
        <button class="btn btn-outline btn-sm" onclick="addProduct()">+ 추가</button>
      </div>
    </div>
    <p style="font-size:.8rem;color:var(--gray);padding:0 4px">
      * N으로 설정된 품목은 주문 폼에서 표시되지 않습니다.
    </p>
  </div>

  <!-- ── 멘트 템플릿 탭 ── -->
  <div class="tab-panel" id="tab-template">
    <div class="card">
      <div class="card-header"><h3>💬 카카오톡 멘트 생성</h3></div>
      <div style="padding:16px">
        <label style="font-size:.85rem;font-weight:600;display:block;margin-bottom:6px">업체 선택</label>
        <select class="template-select" id="template-client" onchange="buildTemplate()">
          <option value="">-- 업체를 선택하세요 --</option>
        </select>

        <label style="font-size:.85rem;font-weight:600;display:block;margin-bottom:6px">출고 예정일</label>
        <input type="date" class="date-input" id="template-date" oninput="buildTemplate()" />

        <label style="font-size:.85rem;font-weight:600;display:block;margin-bottom:6px">생성된 멘트</label>
        <textarea class="template-textarea" id="template-text" placeholder="업체와 날짜를 선택하면 자동 완성됩니다."></textarea>

        <button class="btn btn-green" style="width:100%;margin-top:10px" onclick="copyTemplate()">
          📋 클립보드 복사 (카카오톡 붙여넣기용)
        </button>
      </div>
    </div>
  </div>
</div>

<!-- 수동 주문 입력 모달 -->
<div class="modal-overlay" id="manual-order-modal" style="display:none;align-items:flex-start;justify-content:center;overflow-y:auto;padding:20px">
  <div class="modal" style="max-width:420px;text-align:left;margin:auto">
    <h3 style="margin-bottom:14px">✏️ 수동 주문 입력</h3>

    <label style="font-size:.85rem;font-weight:600;display:block;margin-bottom:4px">업체 검색</label>
    <div style="position:relative;margin-bottom:12px">
      <input type="text" id="manual-client-search" placeholder="업체명 입력..."
        style="width:100%;padding:10px;border:2px solid var(--border);border-radius:8px;font-size:.9rem"
        oninput="filterManualClients()" autocomplete="off" />
      <div id="manual-client-dropdown" style="
        display:none;position:absolute;top:100%;left:0;right:0;
        background:#fff;border:2px solid var(--green);border-top:none;
        border-radius:0 0 8px 8px;max-height:200px;overflow-y:auto;
        z-index:300;box-shadow:0 4px 12px rgba(0,0,0,.1)"></div>
    </div>
    <div id="manual-client-selected" style="display:none;background:var(--green-pale);border-radius:8px;padding:8px 12px;margin-bottom:12px;font-size:.88rem;color:var(--green);font-weight:600"></div>
    <input type="hidden" id="manual-client" />

    <label style="font-size:.85rem;font-weight:600;display:block;margin-bottom:6px">품목별 수량</label>
    <div id="manual-items" style="border:2px solid var(--border);border-radius:8px;margin-bottom:12px;max-height:260px;overflow-y:auto"></div>

    <label style="font-size:.85rem;font-weight:600;display:block;margin-bottom:4px">요청사항 (선택)</label>
    <textarea id="manual-note" style="width:100%;padding:10px;border:2px solid var(--border);border-radius:8px;font-size:.88rem;font-family:inherit;resize:none;height:64px;margin-bottom:14px" placeholder="요청사항 입력..."></textarea>

    <div style="display:flex;gap:8px">
      <button class="btn btn-gray" style="flex:1" onclick="closeManualOrderModal()">취소</button>
      <button class="btn btn-green" style="flex:1" id="manual-submit-btn" onclick="submitManualOrder()">주문 접수</button>
    </div>
    <div id="manual-error" style="color:var(--red);font-size:.82rem;margin-top:8px;text-align:center"></div>
  </div>
</div>

<!-- 알찬회계 모달 -->
<div class="modal-overlay" id="alchan-modal" style="display:none;align-items:center;justify-content:center">
  <div class="modal" style="max-width:340px;text-align:left">
    <h3 style="margin-bottom:6px">📗 알찬회계 엑셀 다운로드</h3>

    const qtyMap = {};

  function parseCSVRow(row) {
    const result = [];
    let cur = '', inQuote = false;
    for (let i = 0; i < row.length; i++) {
      const ch = row[i];
      if (ch === '"') {
        if (inQuote && row[i+1] === '"') { cur += '"'; i++; }
        else inQuote = !inQuote;
      } else if (ch === ',' && !inQuote) {
        result.push(cur.trim()); cur = '';
      } else {
        cur += ch;
      }
    }
    result.push(cur.trim());
    return result;
  }

  async function loadBizNums() {

  function buildTemplate() {
    const clientName = document.getElementById('template-client').value;
    const date       = document.getElementById('template-date').value;

    if (!clientName) {
      document.getElementById('template-text').value = '';
      return;
    }

    // 해당 업체 오늘 주문에서 품목 찾기
    const today = todayStr();
    const order = allOrders.find(o => {
      const ts = new Date(o['타임스탬프']);
      const d = `${ts.getFullYear()}-${String(ts.getMonth()+1).padStart(2,'0')}-${String(ts.getDate()).padStart(2,'0')}`;
      return d === today && o['업체명'] === clientName;
    });

    const itemText = order ? order['내품명'] : '';
    const dateStr  = date
      ? new Date(date).toLocaleDateString('ko-KR', { month: 'long', day: 'numeric' })
      : '___월 ___일';

    let msg = `안녕하세요 ${clientName}님,`;
    if (itemText) msg += `\n${itemText} `;
    msg += `\n현재 재고 부족으로\n${dateStr} 출고 예정입니다.\n양해 부탁드립니다 🙏`;

    document.getElementById('template-text').value = msg;
  }

  async function copyTemplate() {
    const text = document.getElementById('template-text').value;
    if (!text.trim()) { alert('먼저 업체를 선택해 주세요.'); return; }
    try {
      await navigator.clipboard.writeText(text);
      showToast();
    } catch {
      // fallback
      const ta = document.getElementById('template-text');
      ta.select();
      document.execCommand('copy');
      showToast();
    }
  }

    renderCalendar();
  }

  function dateKey(ts) {
    const d = new Date(ts);
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  }

  function renderCalendar() {
    document.getElementById('cal-title').textContent =
      `${calYear}년 ${calMonth+1}월`;

    // 날짜별 주문 수 집계
    const countMap = {};
    allOrders.forEach(o => {
      const k = dateKey(o['타임스탬프']);
      countMap[k] = (countMap[k] || 0) + 1;
    });

    const grid  = document.getElementById('cal-grid');
    const today = todayStr();
    const days  = ['일','월','화','수','목','금','토'];

    grid.innerHTML = days.map(d =>
      `<div class="cal-head">${d}</div>`
    ).join('');

    const firstDay = new Date(calYear, calMonth, 1).getDay();
    const lastDate = new Date(calYear, calMonth+1, 0).getDate();
    const prevLast = new Date(calYear, calMonth, 0).getDate();

    // 이전달 빈칸
    for (let i = 0; i < firstDay; i++) {
      const d = prevLast - firstDay + 1 + i;
      grid.innerHTML += `<div class="cal-day other-month empty"><div class="cal-num">${d}</div></div>`;
    }

    // 이번달
    for (let d = 1; d <= lastDate; d++) {
      const key  = `${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      const cnt  = countMap[key] || 0;
      const isToday = key === today;
      let cls = 'cal-day';
      if (isToday) cls += ' today';
      if (!cnt) cls += ' empty';

      grid.innerHTML += `
        <div class="${cls}" onclick="${cnt ? `showDayOrders('${key}')` : ''}">
          <div class="cal-num">${d}</div>
          ${cnt ? `<div class="cal-badge">${cnt}건</div>` : ''}
          ${isToday ? `<div class="cal-deadline">마감 14:00</div>` : ''}
        </div>`;
    }

    // 다음달 빈칸
    const remaining = (7 - (firstDay + lastDate) % 7) % 7;
    for (let i = 1; i <= remaining; i++) {
      grid.innerHTML += `<div class="cal-day other-month empty"><div class="cal-num">${i}</div></div>`;
    }

    // 선택된 날 주문 숨기기
    document.getElementById('cal-day-orders').style.display = 'none';
  }

  function showDayOrders(dateStr) {
    // 선택 스타일
    document.querySelectorAll('.cal-day').forEach(el => el.classList.remove('selected'));
    event.currentTarget.classList.add('selected');

    const dayOrders = allOrders.filter(o => dateKey(o['타임스탬프']) === dateStr);
    const wrap = document.getElementById('cal-day-orders');
    const title = document.getElementById('cal-day-title');
    const list  = document.getElementById('cal-day-list');

    const [y,m,d] = dateStr.split('-');
    title.textContent = `${y}년 ${parseInt(m)}월 ${parseInt(d)}일 주문 내역 (${dayOrders.length}건)`;

    if (!dayOrders.length) {
      list.innerHTML = '<div class="empty-state"><div class="icon">📭</div>주문 없음</div>';
    } else {
      list.innerHTML = dayOrders.map(o => {
        const ts   = new Date(o['타임스탬프']);
        const time = `${String(ts.getHours()).padStart(2,'0')}:${String(ts.getMinutes()).padStart(2,'0')}`;
        const isLate = ts.getHours() >= ORDER_DEADLINE_HOUR;
        const isDone = o['처리상태'] === '처리완료';
        return `
          <div class="order-card ${isDone ? 'done' : ''}" style="margin:8px;border-radius:var(--radius)">
            <div class="order-head">
              <div>
                <div class="order-name">${o['업체명'] || ''}</div>
                <div class="order-time">
                  ${time}
                  ${isLate ? '<span style="color:var(--orange);font-weight:700;margin-left:4px">⚠️ 익일출고</span>' : ''}
                </div>
              </div>
              <span class="status-badge ${isDone ? 'done' : 'pending'}">${isDone ? '처리완료' : '미처리'}</span>
            </div>
            <div class="order-body">
              <div class="order-items">📦 ${o['내품명'] || '-'}</div>
              ${o['요청사항'] ? `<div class="order-note">💬 ${o['요청사항']}</div>` : ''}
            </div>
          </div>`;
      }).join('');
    }
    wrap.style.display = 'block';
    wrap.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  // ── 수동 주문 입력 ────────────────────────────────────
  function showManualOrderModal() {
    document.getElementById('manual-client-search').value = '';
    document.getElementById('manual-client').value = '';
    document.getElementById('manual-client-selected').style.display = 'none';
    document.getElementById('manual-client-dropdown').style.display = 'none';
    document.getElementById('manual-items').innerHTML = '<div style="padding:12px;color:var(--gray);font-size:.85rem">업체를 먼저 선택해 주세요</div>';
    document.getElementById('manual-note').value = '';
    document.getElementById('manual-error').textContent = '';
    document.getElementById('manual-order-modal').style.display = 'flex';
    setTimeout(() => document.getElementById('manual-client-search').focus(), 100);
  }

  function filterManualClients() {
    const q   = document.getElementById('manual-client-search').value.trim().toLowerCase();
    const dd  = document.getElementById('manual-client-dropdown');
    if (!q) { dd.style.display = 'none'; return; }

    const matches = allClients.filter(c => c.name.toLowerCase().includes(q)).slice(0, 20);
    if (!matches.length) { dd.style.display = 'none'; return; }

    dd.innerHTML = matches.map(c => `
      <div onclick="selectManualClient('${c.name.replace(/'/g,"\\'")}', '${c.phone}', '${c.address.replace(/'/g,"\\'")}', '${c.key}')"
        style="padding:10px 14px;cursor:pointer;font-size:.88rem;border-bottom:1px solid var(--border)"
        onmouseover="this.style.background='var(--green-pale)'"
        onmouseout="this.style.background=''">
        ${c.name}
      </div>`).join('');
    dd.style.display = 'block';
  }

  function selectManualClient(name, phone, address, key) {
    document.getElementById('manual-client').value = name;
    document.getElementById('manual-client-search').value = name;
    document.getElementById('manual-client-dropdown').style.display = 'none';
    const sel = document.getElementById('manual-client-selected');
    sel.textContent = `✅ ${name}`;
    sel.style.display = 'block';
    onManualClientChange();
  }

  function closeManualOrderModal() {
    document.getElementById('manual-order-modal').style.display = 'none';
  }

  function onManualClientChange() {
    const grid = document.getElementById('manual-items');
    if (!allStock.length) {
      grid.innerHTML = '<div style="padding:12px;color:var(--gray);font-size:.85rem">재고 데이터를 불러오는 중...</div>';
      return;
    }
    const stockMap = {};
    allStock.forEach(s => { stockMap[s.name] = s.quantity; });

    grid.innerHTML = allProducts.map(p => {
      const qty = stockMap[p.name] ?? 0;
      const isOut = qty === 0;
      return `
        <div style="display:flex;align-items:center;gap:10px;padding:9px 12px;border-bottom:1px solid var(--border)">
          <div style="flex:1">
            <div style="font-weight:600;font-size:.9rem">${p.name}</div>
            <div style="font-size:.75rem;color:${isOut ? 'var(--red)' : 'var(--gray)'}">재고: ${isOut ? '품절' : qty+'개'}</div>
          </div>
          <input type="number" min="0" value="0"
            id="manual-qty-${p.name}"
            style="width:64px;padding:6px;border:2px solid var(--border);border-radius:7px;text-align:center;font-size:.95rem;font-weight:700" />
        </div>`;
    }).join('');
  }

  async function submitManualOrder() {
    const clientName = document.getElementById('manual-client').value.trim();
    const errEl      = document.getElementById('manual-error');
    errEl.textContent = '';

    if (!clientName) { errEl.textContent = '업체를 검색해서 선택해 주세요.'; return; }

    const client = allClients.find(c => c.name === clientName);
    const items  = {};
    allProducts.forEach(p => {
      const val = parseInt(document.getElementById('manual-qty-' + p.name)?.value) || 0;
      if (val > 0) items[p.name] = val;
    });

    if (!Object.keys(items).length) { errEl.textContent = '품목을 1개 이상 선택해 주세요.'; return; }

    const btn = document.getElementById('manual-submit-btn');
    btn.disabled = true;
    btn.textContent = '접수 중...';

    try {
      const res = await apiPost('submitOrder', {
        clientName: client.name,
        phone:      client.phone || '',
        address:    client.address || '',
        items,
        note: document.getElementById('manual-note').value.trim()
      });

      if (res.error) throw new Error(res.error);

      closeManualOrderModal();
      await refreshAll();
      alert(`✅ ${clientName} 주문이 접수되었습니다.`);
    } catch(e) {
      errEl.textContent = '오류: ' + e.message;
    } finally {
      btn.disabled = false;
      btn.textContent = '주문 접수';
    }
  }

  // ── 알찬회계 다운로드 ─────────────────────────────────
  function showAlchanModal() {
    document.getElementById('alchan-from').value     = viewDate;
    document.getElementById('alchan-to').value       = viewDate;
    document.getElementById('alchan-shipdate').value = viewDate;
    document.getElementById('alchan-modal').style.display = 'flex';
  }
  function closeAlchanModal() {
    document.getElementById('alchan-modal').style.display = 'none';
  }

  async function downloadAlchan() {
    const from     = document.getElementById('alchan-from').value;
    const to       = document.getElementById('alchan-to').value;
    const shipDate = document.getElementById('alchan-shipdate').value;
    if (!from || !to || !shipDate) { alert('날짜를 모두 선택해주세요.'); return; }

    await loadBizNums();

    // 출고일 기준 처리완료 주문만
    const filtered = allOrders.filter(o => {
      const outDate = o['출고일'] ? dateKey(o['출고일']) : '';
      return outDate >= from && outDate <= to && o['처리상태'] === '처리완료';
    });
    if (!filtered.length) { alert('해당 출고일 기간 처리완료 주문이 없습니다.'); return; }

    const headers = ['날짜','구분','적요','공급가액','부가세','계정과목','결제방법','거래처'];

    const rows = [];
    filtered.forEach(o => {
      const clientName  = o['업체명'] || '';
      const entaxClient = CLIENT_NAME_OVERRIDE[clientName] || clientName;
      const itemStr     = o['내품명'] || '';
      const note        = o['요청사항'] || '';

      // 품목별 공급가액 합산
      const tokens = itemStr.trim().split(/\s+/);
      let totalSupply = 0;
      for (let i = 0; i + 1 < tokens.length; i += 2) {
        const name = tokens[i];
        const qty  = parseInt(tokens[i+1]) || 0;
        const price = (EXCEPTION_PRICES[clientName]?.[name]) ?? DEFAULT_PRICES[name] ?? 0;
        totalSupply += price * qty;
      }
      const tax = Math.round(totalSupply * 0.1);
      const 적요 = itemStr + (note ? ` (${note})` : '');

      rows.push([
        shipDate, '', 적요, totalSupply, tax, '상품매출', '외상매출금', entaxClient
      ]);

      // 아람주류: 박스당 택배비 4,000원 (부가세 별도) 행 추가
      if (clientName === '아람주류') {
        const boxes = countBoxes(itemStr);
        if (boxes > 0) {
          const deliverySupply = 4000 * boxes;
          const deliveryTax    = 400  * boxes;
          rows.push([
            shipDate, '', '택배비', deliverySupply, deliveryTax, '상품매출', '외상매출금', entaxClient
          ]);
        }
      }
    });

    const wb = XLSX.utils.book_new();
    const ws = XLSX.utils.aoa_to_sheet([headers, ...rows]);
    XLSX.utils.book_append_sheet(wb, ws, '매출');
    XLSX.writeFile(wb, `알찬회계_${from}~${to}.xls`);
    closeAlchanModal();
  }

  // ── ENtax CS 다운로드 ─────────────────────────────────
  function showEntaxModal() {
    document.getElementById('entax-from').value     = viewDate;
    document.getElementById('entax-to').value       = viewDate;
    document.getElementById('entax-shipdate').value = viewDate;
    document.getElementById('entax-modal').style.display = 'flex';
  }
  function closeEntaxModal() {
    document.getElementById('entax-modal').style.display = 'none';
  }

  async function downloadEntax() {
    const from     = document.getElementById('entax-from').value;
    const to       = document.getElementById('entax-to').value;
    const shipDate = document.getElementById('entax-shipdate').value;
    if (!from || !to || !shipDate) { alert('날짜를 모두 선택해주세요.'); return; }

    // 단가 조회 (로컬 설정 기반)
    function getPrice(clientName, productName) {
      if (EXCEPTION_PRICES[clientName] && EXCEPTION_PRICES[clientName][productName] !== undefined) {
        return EXCEPTION_PRICES[clientName][productName];
      }
      return DEFAULT_PRICES[productName] || 0;
    }

    // 사업자번호 최신 데이터로 새로 로드
    await loadBizNums();
    const bizMap = bizNumMap;

    // 출고일 기준 처리완료 주문만
    const filtered = allOrders.filter(o => {
      const outDate = o['출고일'] ? dateKey(o['출고일']) : '';
      return outDate >= from && outDate <= to && o['처리상태'] === '처리완료';
    });

    if (!filtered.length) { alert('해당 출고일 기간 처리완료 주문이 없습니다.'); return; }

    const headers = ['번호','작성일자','구분','우리사업자번호','거래처사업자번호','거래처명',
      '제품코드','제품명','규격','단위','단가','수량','공급가액','세액',
      '영수청구','결제방식','미수금','증빙서','간편장부','고정자산',
      '비고','카드번호','주문번호','판매방식','일련번호','큰상자'];

    const rows = [];
    let seq = 1;

    filtered.forEach(o => {
      const clientName    = o['업체명'] || '';
      const bizTarget     = BIZ_NUM_OVERRIDE[clientName] || clientName;
      const bizNum        = bizMap[bizTarget] || '';
      const entaxClient   = CLIENT_NAME_OVERRIDE[clientName] || clientName;
      const itemStr    = o['내품명'] || '';
      const note       = o['요청사항'] || '';

      // "망고 10 패션후르츠 5" 파싱
      const tokens = itemStr.trim().split(/\s+/);
      const items  = [];
      for (let i = 0; i + 1 < tokens.length; i += 2) {
        const name = tokens[i];
        const qty  = parseInt(tokens[i+1]) || 0;
        if (name && qty > 0) items.push({ name, qty });
      }

      items.forEach(item => {
        const price      = getPrice(clientName, item.name);
        const supply     = price * item.qty;
        const tax        = Math.round(supply * 0.1);
        const entaxName  = PRODUCT_NAME_MAP[item.name] || item.name;
        const entaxCode  = PRODUCT_CODE_MAP[item.name] || '';
        rows.push([
          seq++, shipDate, '매출', '', bizNum, entaxClient,
          entaxCode, entaxName, '', 'EA', price, item.qty, supply, tax,
          '청구', '', supply + tax, '', 1, 1,
          note, '', '', '', '', ''
        ]);
      });

      // 아람주류: 박스당 택배비 4,000원 (부가세 별도) 행 추가
      if (clientName === '아람주류') {
        const boxes = countBoxes(itemStr);
        if (boxes > 0) {
          const deliverySupply = 4000 * boxes;
          const deliveryTax    = 400  * boxes;
          rows.push([
            seq++, shipDate, '매출', '', bizNum, entaxClient,
            '택배비', '택배비', '', 'BOX', 4000, boxes, deliverySupply, deliveryTax,
            '청구', '', deliverySupply + deliveryTax, '', 1, 1,
            note, '', '', '', '', ''
          ]);
        }
      }
    });

    if (!rows.length) { alert('품목 데이터를 파싱할 수 없습니다.'); return; }

    const wb = XLSX.utils.book_new();
    const ws = XLSX.utils.aoa_to_sheet([headers, ...rows]);
    XLSX.utils.book_append_sheet(wb, ws, '거래내역');
    XLSX.writeFile(wb, `ENtax_${from}~${to}_출고${shipDate}.xls`);
    closeEntaxModal();
  }

  // ── API ───────────────────────────────────────────────
  function api(action) {
    return fetch(`${WEBAPP_URL}?action=${action}`).then(r => r.json());
  }
  function apiPost(action, data) {
    return fetch(`${WEBAPP_URL}?action=${action}`, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain' },
      body: JSON.stringify(data)
    }).then(r => r.json());
  }

  // 오늘 날짜를 날짜 입력 기본값으로
  document.getElementById('template-date').value = todayStr();

  // 3분마다 주문 데이터 자동 새로고침 (취소/신규 주문 자동 반영)
  setInterval(async () => {
    try {
      const [oRes, cRes] = await Promise.all([api('orders'), api('clients')]);
      allOrders  = oRes.orders  || [];
      allClients = cRes.clients || [];
      renderOrders();
      renderTemplateClients();
    } catch (e) { /* 실패해도 무시 */ }
  }, 3 * 60 * 1000);
</script>
