<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>옥수주조 관리자</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green: #2d6a4f;
      --green-light: #40916c;
      --green-pale: #d8f3dc;
      --red: #e63946;
      --red-pale: #ffeaea;
      --orange: #fd7e14;
      --yellow-pale: #fff3cd;
      --gray: #6c757d;
      --gray-light: #f8f9fa;
      --border: #dee2e6;
      --radius: 10px;
      --shadow: 0 2px 8px rgba(0,0,0,.08);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Noto Sans KR', sans-serif;
      background: #f0f4f1;
      color: #212529;
      min-height: 100vh;
    }

    /* ── 로그인 화면 ── */
    .login-wrap {
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh;
    }
    .login-box {
      background: #fff;
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 40px 32px;
      width: 100%; max-width: 340px;
      text-align: center;
    }
    .login-box h1 { font-size: 1.3rem; color: var(--green); margin-bottom: 6px; }
    .login-box p  { color: var(--gray); font-size: .85rem; margin-bottom: 24px; }
    .login-box input {
      width: 100%; padding: 12px 14px;
      border: 2px solid var(--border); border-radius: 8px;
      font-size: 1rem; margin-bottom: 12px;
    }
    .login-box input:focus { outline: none; border-color: var(--green); }
    .login-box .btn-login {
      width: 100%; padding: 13px;
      background: var(--green); color: #fff;
      border: none; border-radius: 8px;
      font-size: 1rem; font-weight: 700; cursor: pointer;
    }
    .login-box .btn-login:hover { background: var(--green-light); }
    .login-error { color: var(--red); font-size: .85rem; margin-top: 8px; }

    /* ── 레이아웃 ── */
    #dashboard { display: none; min-height: 100vh; }

    .top-bar {
      background: var(--green);
      color: #fff;
      padding: 14px 20px;
      display: flex; align-items: center; justify-content: space-between;
      position: sticky; top: 0; z-index: 100;
      box-shadow: 0 2px 8px rgba(0,0,0,.2);
    }
    .top-bar h1 { font-size: 1.1rem; }
    .top-bar .refresh-btn {
      background: rgba(255,255,255,.2);
      border: none; color: #fff;
      padding: 6px 14px; border-radius: 6px;
      cursor: pointer; font-size: .85rem;
    }
    .top-bar .refresh-btn:hover { background: rgba(255,255,255,.3); }

    /* ── 탭 ── */
    .tabs {
      display: flex;
      background: #fff;
      border-bottom: 2px solid var(--border);
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }
    .tab-btn {
      flex: 1; min-width: 80px;
      padding: 13px 8px;
      border: none; background: none;
      font-size: .82rem; font-weight: 600;
      color: var(--gray); cursor: pointer;
      white-space: nowrap;
      border-bottom: 3px solid transparent;
      margin-bottom: -2px;
      transition: color .2s;
    }
    .tab-btn.active { color: var(--green); border-bottom-color: var(--green); }
    .tab-btn:hover { color: var(--green-light); }

    .tab-panel { display: none; padding: 16px; max-width: 900px; margin: 0 auto; }
    .tab-panel.active { display: block; }

    /* ── 공통 카드 ── */
    .card {
      background: #fff; border-radius: var(--radius);
      box-shadow: var(--shadow); margin-bottom: 14px; overflow: hidden;
    }
    .card-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 16px;
      background: var(--green-pale);
      border-bottom: 1px solid #b7e4c7;
    }
    .card-header h3 { color: var(--green); font-size: .95rem; }

    /* ── 버튼 ── */
    .btn {
      padding: 8px 16px; border: none; border-radius: 7px;
      font-size: .85rem; font-weight: 600; cursor: pointer;
      transition: opacity .2s;
    }
    .btn:hover { opacity: .85; }
    .btn-green  { background: var(--green); color: #fff; }
    .btn-outline { background: #fff; color: var(--green); border: 2px solid var(--green); }
    .btn-red    { background: var(--red); color: #fff; }
    .btn-gray   { background: #e9ecef; color: #212529; }
    .btn-sm { padding: 5px 10px; font-size: .78rem; }

    /* ── 통계 배지 ── */
    .stat-row { display: flex; gap: 10px; margin-bottom: 14px; flex-wrap: wrap; }
    .stat-card {
      flex: 1; min-width: 100px;
      background: #fff; border-radius: var(--radius);
      box-shadow: var(--shadow); padding: 14px 16px;
      text-align: center;
    }
    .stat-card .num { font-size: 1.8rem; font-weight: 800; color: var(--green); }
    .stat-card .lbl { font-size: .78rem; color: var(--gray); margin-top: 2px; }

    /* ── 주문 카드 ── */
    .order-card {
      background: #fff; border-radius: var(--radius);
      box-shadow: var(--shadow); margin-bottom: 10px;
      overflow: hidden; border-left: 4px solid var(--green);
    }
    .order-card.done { border-left-color: var(--gray); opacity: .7; }
    .order-head {
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 14px; gap: 8px; flex-wrap: wrap;
    }
    .order-name { font-weight: 700; font-size: .95rem; }
    .order-time { font-size: .78rem; color: var(--gray); }
    .order-body { padding: 0 14px 12px; }
    .order-items { font-size: .88rem; color: #444; line-height: 1.7; }
    .order-note  { font-size: .82rem; color: var(--gray); margin-top: 4px; }

    .status-badge {
      padding: 3px 10px; border-radius: 20px;
      font-size: .75rem; font-weight: 700;
    }
    .status-badge.pending  { background: #fff3cd; color: #664d03; }
    .status-badge.done     { background: var(--green-pale); color: var(--green); }

    /* ── 필터 행 ── */
    .filter-row { display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; }
    .filter-btn {
      padding: 6px 14px; border-radius: 20px;
      border: 2px solid var(--border);
      background: #fff; color: var(--gray);
      font-size: .82rem; font-weight: 600; cursor: pointer;
    }
    .filter-btn.active { background: var(--green); color: #fff; border-color: var(--green); }

    /* ── 재고 테이블 ── */
    .stock-grid { padding: 4px 0; }
    .stock-row {
      display: flex; align-items: center; gap: 12px;
      padding: 10px 16px; border-bottom: 1px solid var(--border);
    }
    .stock-row:last-child { border-bottom: none; }
    .stock-name { flex: 1; font-weight: 600; font-size: .92rem; }
    .stock-input {
      width: 80px; padding: 7px 10px;
      border: 2px solid var(--border); border-radius: 7px;
      font-size: .95rem; text-align: center; font-weight: 700;
    }
    .stock-input:focus { outline: none; border-color: var(--green); }
    .stock-input.zero { border-color: var(--red); color: var(--red); }

    /* ── 상품 관리 ── */
    .product-row {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 16px; border-bottom: 1px solid var(--border);
    }
    .product-row:last-child { border-bottom: none; }
    .product-name-input {
      flex: 1; padding: 7px 10px;
      border: 1px solid var(--border); border-radius: 7px;
      font-size: .88rem;
    }
    .product-name-input:focus { outline: none; border-color: var(--green); }
    .toggle-btn {
      padding: 5px 12px; border-radius: 6px; border: none;
      font-size: .78rem; font-weight: 700; cursor: pointer;
    }
    .toggle-btn.on  { background: var(--green-pale); color: var(--green); }
    .toggle-btn.off { background: #e9ecef; color: var(--gray); }

    .add-product-row {
      display: flex; gap: 8px; padding: 12px 16px;
      border-top: 2px dashed var(--border);
    }
    .add-product-row input {
      flex: 1; padding: 8px 12px;
      border: 2px solid var(--border); border-radius: 7px;
      font-size: .88rem;
    }
    .add-product-row input:focus { outline: none; border-color: var(--green); }

    /* ── 멘트 템플릿 ── */
    .template-select {
      width: 100%; padding: 10px 14px;
      border: 2px solid var(--border); border-radius: 8px;
      font-size: .9rem; margin-bottom: 12px;
    }
    .template-select:focus { outline: none; border-color: var(--green); }
    .template-textarea {
      width: 100%; padding: 14px;
      border: 2px solid var(--border); border-radius: 8px;
      font-size: .9rem; font-family: inherit;
      min-height: 140px; resize: none; line-height: 1.7;
    }
    .template-textarea:focus { outline: none; border-color: var(--green); }
    .date-input {
      width: 100%; padding: 9px 14px;
      border: 2px solid var(--border); border-radius: 8px;
      font-size: .9rem; margin-bottom: 10px;
    }
    .date-input:focus { outline: none; border-color: var(--green); }
    .copy-toast {
      display: none;
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
      background: #212529; color: #fff;
      padding: 10px 20px; border-radius: 20px; font-size: .88rem;
      z-index: 999;
    }

    /* ── 다운로드 버튼 행 ── */
    .action-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 12px; }

    /* ── 빈 상태 ── */
    .empty-state {
      text-align: center; padding: 40px 20px;
      color: var(--gray); font-size: .9rem;
    }
    .empty-state .icon { font-size: 2.5rem; margin-bottom: 10px; }

    /* ── 모바일 대응 ── */
    @media (max-width: 480px) {
      .tab-panel { padding: 10px; }
      .order-head { gap: 6px; }
    }
  </style>
</head>
<body>

<!-- ── 로그인 ─────────────────────────────────────── -->
<div id="login-screen" class="login-wrap">
  <div class="login-box">
    <h1>🍶 옥수주조</h1>
    <p>관리자 대시보드</p>
    <input type="password" id="pw-input" placeholder="비밀번호 입력"
      onkeydown="if(event.key==='Enter')doLogin()" />
    <button class="btn-login" onclick="doLogin()">로그인</button>
    <div class="login-error" id="login-error"></div>
  </div>
</div>

<!-- ── 대시보드 ────────────────────────────────────── -->
<div id="dashboard">
  <div class="top-bar">
    <h1>🍶 옥수주조 관리자</h1>
    <button class="refresh-btn" onclick="refreshAll()">🔄 새로고침</button>
  </div>

  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('orders')">📋 주문 현황</button>
    <button class="tab-btn" onclick="switchTab('stock')">📦 재고 관리</button>
    <button class="tab-btn" onclick="switchTab('products')">🏷️ 상품 관리</button>
    <button class="tab-btn" onclick="switchTab('template')">💬 멘트 템플릿</button>
  </div>

  <!-- ── 주문 현황 탭 ── -->
  <div class="tab-panel active" id="tab-orders">
    <div class="stat-row">
      <div class="stat-card"><div class="num" id="stat-today">0</div><div class="lbl">오늘 주문</div></div>
      <div class="stat-card"><div class="num" id="stat-pending">0</div><div class="lbl">미처리</div></div>
      <div class="stat-card"><div class="num" id="stat-done">0</div><div class="lbl">처리완료</div></div>
    </div>

    <div class="action-row">
      <button class="btn btn-green" onclick="downloadCJ()">📥 CJ대한통운 엑셀 다운로드</button>
    </div>

    <div class="filter-row">
      <button class="filter-btn active" onclick="setFilter('all',this)">전체</button>
      <button class="filter-btn" onclick="setFilter('미처리',this)">미처리</button>
      <button class="filter-btn" onclick="setFilter('처리완료',this)">처리완료</button>
    </div>

    <div id="order-list"></div>
  </div>

  <!-- ── 재고 관리 탭 ── -->
  <div class="tab-panel" id="tab-stock">
    <div class="card">
      <div class="card-header">
        <h3>📦 재고 수량 관리</h3>
        <button class="btn btn-green btn-sm" onclick="saveStock()">💾 저장</button>
      </div>
      <div class="stock-grid" id="stock-grid"></div>
    </div>
  </div>

  <!-- ── 상품 관리 탭 ── -->
  <div class="tab-panel" id="tab-products">
    <div class="card">
      <div class="card-header">
        <h3>🏷️ 상품 목록</h3>
        <button class="btn btn-green btn-sm" onclick="saveProducts()">💾 저장</button>
      </div>
      <div id="product-list"></div>
      <div class="add-product-row">
        <input type="text" id="new-product-name" placeholder="새 품목명 입력" />
        <button class="btn btn-outline btn-sm" onclick="addProduct()">+ 추가</button>
      </div>
    </div>
    <p style="font-size:.8rem;color:var(--gray);padding:0 4px">
      * N으로 설정된 품목은 주문 폼에서 표시되지 않습니다.
    </p>
  </div>

  <!-- ── 멘트 템플릿 탭 ── -->
  <div class="tab-panel" id="tab-template">
    <div class="card">
      <div class="card-header"><h3>💬 카카오톡 멘트 생성</h3></div>
      <div style="padding:16px">
        <label style="font-size:.85rem;font-weight:600;display:block;margin-bottom:6px">업체 선택</label>
        <select class="template-select" id="template-client" onchange="buildTemplate()">
          <option value="">-- 업체를 선택하세요 --</option>
        </select>

        <label style="font-size:.85rem;font-weight:600;display:block;margin-bottom:6px">출고 예정일</label>
        <input type="date" class="date-input" id="template-date" oninput="buildTemplate()" />

        <label style="font-size:.85rem;font-weight:600;display:block;margin-bottom:6px">생성된 멘트</label>
        <textarea class="template-textarea" id="template-text" placeholder="업체와 날짜를 선택하면 자동 완성됩니다."></textarea>

        <button class="btn btn-green" style="width:100%;margin-top:10px" onclick="copyTemplate()">
          📋 클립보드 복사 (카카오톡 붙여넣기용)
        </button>
      </div>
    </div>
  </div>
</div>

<div class="copy-toast" id="copy-toast">✅ 복사되었습니다!</div>

<script>
  // ── 설정 ──────────────────────────────────────────────
  const WEBAPP_URL  = 'https://script.google.com/macros/s/AKfycbxbpnr3MeRL9fpeMDnks3f1rPnD3aFbgPuy77doP7qJsijON0T0sIgCAexqCScKfEh0LA/exec';
  const PASSWORD    = 'admin1234';

  // ── 상태 ──────────────────────────────────────────────
  let allOrders   = [];
  let allStock    = [];
  let allProducts = [];
  let allClients  = [];
  let currentFilter = 'all';

  // ── 로그인 ────────────────────────────────────────────
  function doLogin() {
    const pw = document.getElementById('pw-input').value;
    if (pw === PASSWORD) {
      document.getElementById('login-screen').style.display = 'none';
      document.getElementById('dashboard').style.display = 'block';
      refreshAll();
    } else {
      document.getElementById('login-error').textContent = '비밀번호가 올바르지 않습니다.';
    }
  }

  // ── 탭 전환 ───────────────────────────────────────────
  function switchTab(name) {
    document.querySelectorAll('.tab-btn').forEach((b,i) => {
      const names = ['orders','stock','products','template'];
      b.classList.toggle('active', names[i] === name);
    });
    document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
    document.getElementById('tab-'+name).classList.add('active');
  }

  // ── 새로고침 ──────────────────────────────────────────
  async function refreshAll() {
    try {
      const [oRes, sRes, pRes, cRes] = await Promise.all([
        api('orders'), api('stock'), api('products'), api('clients')
      ]);
      allOrders   = oRes.orders   || [];
      allStock    = sRes.stock    || [];
      allProducts = pRes.products || [];
      allClients  = cRes.clients  || [];

      renderOrders();
      renderStock();
      renderProducts();
      renderTemplateClients();
    } catch (e) {
      alert('데이터 로드 실패: ' + e.message);
    }
  }

  // ── 주문 현황 ─────────────────────────────────────────
  function todayStr() {
    const d = new Date();
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  }

  function setFilter(f, btn) {
    currentFilter = f;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderOrders();
  }

  function renderOrders() {
    const today = todayStr();
    const todayOrders = allOrders.filter(o => {
      const ts = new Date(o['타임스탬프']);
      const d = `${ts.getFullYear()}-${String(ts.getMonth()+1).padStart(2,'0')}-${String(ts.getDate()).padStart(2,'0')}`;
      return d === today;
    });

    const pending = todayOrders.filter(o => o['처리상태'] !== '처리완료');
    const done    = todayOrders.filter(o => o['처리상태'] === '처리완료');

    document.getElementById('stat-today').textContent   = todayOrders.length;
    document.getElementById('stat-pending').textContent = pending.length;
    document.getElementById('stat-done').textContent    = done.length;

    let filtered = todayOrders;
    if (currentFilter === '미처리')   filtered = pending;
    if (currentFilter === '처리완료') filtered = done;

    const list = document.getElementById('order-list');
    if (!filtered.length) {
      list.innerHTML = '<div class="empty-state"><div class="icon">📭</div>해당하는 주문이 없습니다.</div>';
      return;
    }

    list.innerHTML = filtered.map(o => {
      const isDone = o['처리상태'] === '처리완료';
      const ts = new Date(o['타임스탬프']);
      const time = `${String(ts.getHours()).padStart(2,'0')}:${String(ts.getMinutes()).padStart(2,'0')}`;
      return `
        <div class="order-card ${isDone ? 'done' : ''}">
          <div class="order-head">
            <div>
              <div class="order-name">${o['업체명'] || ''}</div>
              <div class="order-time">${time} · ${o['전화번호'] || ''}</div>
            </div>
            <div style="display:flex;gap:6px;align-items:center">
              <span class="status-badge ${isDone ? 'done' : 'pending'}">
                ${isDone ? '처리완료' : '미처리'}
              </span>
              <button class="btn btn-sm ${isDone ? 'btn-gray' : 'btn-green'}"
                onclick="toggleStatus(${o.rowIndex},'${isDone ? '미처리' : '처리완료'}')">
                ${isDone ? '되돌리기' : '완료 처리'}
              </button>
            </div>
          </div>
          <div class="order-body">
            <div class="order-items">📦 ${o['내품명'] || '-'}</div>
            ${o['요청사항'] ? `<div class="order-note">💬 ${o['요청사항']}</div>` : ''}
            <div class="order-note" style="margin-top:4px">📍 ${o['주소'] || ''}</div>
          </div>
        </div>`;
    }).join('');
  }

  async function toggleStatus(rowIndex, newStatus) {
    try {
      await apiPost('updateStatus', { rowIndex, status: newStatus });
      const o = allOrders.find(x => x.rowIndex === rowIndex);
      if (o) o['처리상태'] = newStatus;
      renderOrders();
    } catch (e) { alert('오류: ' + e.message); }
  }

  // ── CJ대한통운 엑셀 다운로드 ─────────────────────────
  function downloadCJ() {
    const today = todayStr();
    const todayOrders = allOrders.filter(o => {
      const ts = new Date(o['타임스탬프']);
      const d = `${ts.getFullYear()}-${String(ts.getMonth()+1).padStart(2,'0')}-${String(ts.getDate()).padStart(2,'0')}`;
      return d === today;
    });

    if (!todayOrders.length) { alert('오늘 주문이 없습니다.'); return; }

    const headers = [
      '받는분성명','받는분전화번호','받는분주소(전체)','받는분주소(분할)',
      '품목명','박스','운임구분','박스타입','내품명','배송메세지1'
    ];

    const rows = todayOrders.map(o => [
      o['업체명']   || '',
      o['전화번호'] || '',
      o['주소']     || '',
      '',
      '신선식품(냉장)',
      1,
      '신용',
      '극소',
      o['내품명']   || '',
      o['요청사항'] || ''
    ]);

    const csv = [headers, ...rows]
      .map(r => r.map(c => `"${String(c).replace(/"/g,'""')}"`).join(','))
      .join('\r\n');

    const bom  = '﻿';
    const blob = new Blob([bom + csv], { type: 'text/csv;charset=utf-8;' });
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    a.href     = url;
    a.download = `CJ_${today}.csv`;
    a.click();
    URL.revokeObjectURL(url);
  }

  // ── 재고 관리 ─────────────────────────────────────────
  function renderStock() {
    const grid = document.getElementById('stock-grid');
    if (!allStock.length) {
      grid.innerHTML = '<div class="empty-state"><div class="icon">📦</div>재고 데이터가 없습니다.</div>';
      return;
    }
    grid.innerHTML = allStock.map(s => `
      <div class="stock-row">
        <div class="stock-name">${s.name}</div>
        <input class="stock-input ${s.quantity === 0 ? 'zero' : ''}"
          type="number" min="0" id="stock-${s.name}"
          value="${s.quantity}"
          oninput="this.className='stock-input'+(parseInt(this.value)===0?' zero':'')" />
        <span style="color:var(--gray);font-size:.82rem">개</span>
      </div>`
    ).join('');
  }

  async function saveStock() {
    const items = allStock.map(s => ({
      name:     s.name,
      quantity: parseInt(document.getElementById('stock-'+s.name)?.value) || 0
    }));
    try {
      await apiPost('updateStock', { items });
      await refreshAll();
      alert('재고가 저장되었습니다.');
    } catch (e) { alert('오류: ' + e.message); }
  }

  // ── 상품 관리 ─────────────────────────────────────────
  let productList = []; // { name, active }

  function renderProducts() {
    // 전체 상품목록 시트 데이터 필요 → allProducts은 Y만 → 별도 패치 필요하지만
    // 현재 API가 Y만 반환. 관리자용으로 모든 상품 가져오려면 별도 action 추가 필요.
    // 여기서는 allProducts를 기반으로 productList 유지.
    if (!productList.length) {
      productList = allProducts.map(p => ({ name: p.name, active: true }));
    }
    renderProductRows();
  }

  function renderProductRows() {
    const list = document.getElementById('product-list');
    list.innerHTML = productList.map((p, i) => `
      <div class="product-row" id="prow-${i}">
        <input class="product-name-input" type="text"
          value="${p.name}" onchange="productList[${i}].name=this.value" />
        <button class="toggle-btn ${p.active ? 'on' : 'off'}"
          onclick="toggleProduct(${i})">
          ${p.active ? 'Y (표시)' : 'N (숨김)'}
        </button>
        <button class="btn btn-red btn-sm" onclick="removeProduct(${i})">삭제</button>
      </div>`
    ).join('');
  }

  function toggleProduct(i) {
    productList[i].active = !productList[i].active;
    renderProductRows();
  }

  function addProduct() {
    const input = document.getElementById('new-product-name');
    const name  = input.value.trim();
    if (!name) return;
    productList.push({ name, active: true });
    input.value = '';
    renderProductRows();
  }

  function removeProduct(i) {
    if (!confirm(`"${productList[i].name}" 을(를) 삭제하시겠습니까?`)) return;
    productList.splice(i, 1);
    renderProductRows();
  }

  async function saveProducts() {
    try {
      await apiPost('updateProducts', { products: productList });
      await refreshAll();
      alert('상품 목록이 저장되었습니다.');
    } catch (e) { alert('오류: ' + e.message); }
  }

  // ── 멘트 템플릿 ───────────────────────────────────────
  function renderTemplateClients() {
    const sel = document.getElementById('template-client');
    const cur = sel.value;
    sel.innerHTML = '<option value="">-- 업체를 선택하세요 --</option>';
    // 오늘 주문한 업체 먼저
    const today = todayStr();
    const todayNames = new Set(allOrders
      .filter(o => {
        const ts = new Date(o['타임스탬프']);
        const d = `${ts.getFullYear()}-${String(ts.getMonth()+1).padStart(2,'0')}-${String(ts.getDate()).padStart(2,'0')}`;
        return d === today;
      })
      .map(o => o['업체명']));

    if (todayNames.size) {
      const grp = document.createElement('optgroup');
      grp.label = '오늘 주문';
      todayNames.forEach(name => {
        const opt = document.createElement('option');
        opt.value = name; opt.textContent = name;
        grp.appendChild(opt);
      });
      sel.appendChild(grp);
    }

    const grp2 = document.createElement('optgroup');
    grp2.label = '전체 거래처';
    allClients.forEach(c => {
      const opt = document.createElement('option');
      opt.value = c.name; opt.textContent = c.name;
      grp2.appendChild(opt);
    });
    sel.appendChild(grp2);
    if (cur) sel.value = cur;
  }

  function buildTemplate() {
    const clientName = document.getElementById('template-client').value;
    const date       = document.getElementById('template-date').value;

    if (!clientName) {
      document.getElementById('template-text').value = '';
      return;
    }

    // 해당 업체 오늘 주문에서 품목 찾기
    const today = todayStr();
    const order = allOrders.find(o => {
      const ts = new Date(o['타임스탬프']);
      const d = `${ts.getFullYear()}-${String(ts.getMonth()+1).padStart(2,'0')}-${String(ts.getDate()).padStart(2,'0')}`;
      return d === today && o['업체명'] === clientName;
    });

    const itemText = order ? order['내품명'] : '';
    const dateStr  = date
      ? new Date(date).toLocaleDateString('ko-KR', { month: 'long', day: 'numeric' })
      : '___월 ___일';

    let msg = `안녕하세요 ${clientName}님,`;
    if (itemText) msg += `\n${itemText} `;
    msg += `\n현재 재고 부족으로\n${dateStr} 출고 예정입니다.\n양해 부탁드립니다 🙏`;

    document.getElementById('template-text').value = msg;
  }

  async function copyTemplate() {
    const text = document.getElementById('template-text').value;
    if (!text.trim()) { alert('먼저 업체를 선택해 주세요.'); return; }
    try {
      await navigator.clipboard.writeText(text);
      showToast();
    } catch {
      // fallback
      const ta = document.getElementById('template-text');
      ta.select();
      document.execCommand('copy');
      showToast();
    }
  }

  function showToast() {
    const t = document.getElementById('copy-toast');
    t.style.display = 'block';
    setTimeout(() => { t.style.display = 'none'; }, 2000);
  }

  // ── API ───────────────────────────────────────────────
  function api(action) {
    return fetch(`${WEBAPP_URL}?action=${action}`).then(r => r.json());
  }
  function apiPost(action, data) {
    return fetch(`${WEBAPP_URL}?action=${action}`, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain' },
      body: JSON.stringify(data)
    }).then(r => r.json());
  }

  // 오늘 날짜를 날짜 입력 기본값으로
  document.getElementById('template-date').value = todayStr();
</script>
</body>
</html>
