<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="옥수주조 주문" />
  <meta name="theme-color" content="#2d6a4f" />
  <title>옥수주조 주문</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green: #2d6a4f;
      --green-light: #40916c;
      --green-pale: #d8f3dc;
      --red: #e63946;
      --red-pale: #ffeaea;
      --gray: #6c757d;
      --gray-light: #f8f9fa;
      --border: #dee2e6;
      --radius: 12px;
      --shadow: 0 2px 12px rgba(0,0,0,.08);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Noto Sans KR', sans-serif;
      background: #f0f4f1;
      color: #212529;
      min-height: 100dvh;
    }

    /* ── 헤더 ── */
    .header {
      background: var(--green);
      color: #fff;
      padding: 20px 16px 16px;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 2px 8px rgba(0,0,0,.2);
    }
    .header h1 { font-size: 1.2rem; font-weight: 700; }
    .header .client-name {
      font-size: .85rem;
      opacity: .85;
      margin-top: 2px;
    }

    /* ── 경고 배너 ── */
    .notice {
      background: #fff3cd;
      border-left: 4px solid #ffc107;
      padding: 12px 16px;
      font-size: .85rem;
      line-height: 1.5;
      font-weight: 600;
      color: #664d03;
    }

    /* ── 컨테이너 ── */
    .container { padding: 12px 12px 100px; max-width: 600px; margin: 0 auto; }

    /* ── 카드 ── */
    .card {
      background: #fff;
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      margin-bottom: 12px;
      overflow: hidden;
    }
    .card-title {
      background: var(--green-pale);
      color: var(--green);
      font-weight: 700;
      font-size: .9rem;
      padding: 10px 16px;
      border-bottom: 1px solid #b7e4c7;
    }

    /* ── 품목 행 ── */
    .item-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
    }
    .item-row:last-child { border-bottom: none; }

    .item-info { flex: 1; min-width: 0; }
    .item-name { font-weight: 600; font-size: .95rem; }
    .item-stock { font-size: .78rem; color: var(--gray); margin-top: 2px; }
    .item-stock.out { color: var(--red); font-weight: 600; }
    .item-warn {
      font-size: .75rem;
      color: var(--red);
      font-weight: 600;
      margin-top: 3px;
    }

    .qty-wrap {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-shrink: 0;
    }
    .qty-btn {
      width: 36px; height: 36px;
      border: 2px solid var(--green);
      background: #fff;
      color: var(--green);
      border-radius: 50%;
      font-size: 1.2rem;
      line-height: 1;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      -webkit-tap-highlight-color: transparent;
      transition: background .15s;
    }
    .qty-btn:active { background: var(--green-pale); }
    .qty-btn:disabled { border-color: var(--border); color: var(--border); pointer-events: none; }

    .qty-input {
      width: 52px;
      text-align: center;
      border: 2px solid var(--border);
      border-radius: 8px;
      padding: 6px 4px;
      font-size: 1rem;
      font-weight: 700;
      -moz-appearance: textfield;
    }
    .qty-input::-webkit-inner-spin-button,
    .qty-input::-webkit-outer-spin-button { -webkit-appearance: none; }
    .qty-input:focus { outline: none; border-color: var(--green); }
    .qty-input.over { border-color: var(--red); color: var(--red); }
    .qty-input:disabled { background: var(--gray-light); color: #aaa; border-color: var(--border); }

    .sold-out-badge {
      background: #e9ecef;
      color: var(--gray);
      border-radius: 6px;
      padding: 6px 10px;
      font-size: .78rem;
      font-weight: 700;
      white-space: nowrap;
    }

    /* ── 요청사항 ── */
    textarea {
      width: 100%;
      padding: 12px;
      border: none;
      font-size: .9rem;
      font-family: inherit;
      resize: none;
      min-height: 80px;
      color: #212529;
    }
    textarea:focus { outline: 2px solid var(--green); }

    /* ── 요약 ── */
    .summary-card {
      background: var(--green-pale);
      border: 2px solid var(--green-light);
      border-radius: var(--radius);
      padding: 14px 16px;
      margin-bottom: 12px;
    }
    .summary-title { font-weight: 700; color: var(--green); font-size: .9rem; margin-bottom: 8px; }
    .summary-item { font-size: .88rem; padding: 2px 0; }
    .summary-empty { color: var(--gray); font-size: .88rem; }

    /* ── 제출 버튼 ── */
    .submit-wrap {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      padding: 12px 16px;
      background: rgba(255,255,255,.95);
      backdrop-filter: blur(8px);
      border-top: 1px solid var(--border);
      max-width: 600px;
      margin: 0 auto;
    }
    .btn-submit {
      width: 100%;
      padding: 16px;
      background: var(--green);
      color: #fff;
      border: none;
      border-radius: var(--radius);
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: background .2s, opacity .2s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-submit:active { background: var(--green-light); }
    .btn-submit:disabled { background: #adb5bd; cursor: not-allowed; opacity: .7; }

    /* ── 에러/로딩 ── */
    .screen-center {
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      min-height: 60dvh; gap: 16px; padding: 24px;
      text-align: center;
    }
    .screen-center .icon { font-size: 3rem; }
    .screen-center h2 { font-size: 1.1rem; color: #212529; }
    .screen-center p { color: var(--gray); font-size: .9rem; }

    .spinner {
      width: 40px; height: 40px;
      border: 4px solid var(--green-pale);
      border-top-color: var(--green);
      border-radius: 50%;
      animation: spin .8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── 모달 ── */
    .modal-overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,.5);
      z-index: 200;
      align-items: center; justify-content: center;
      padding: 20px;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: #fff;
      border-radius: var(--radius);
      padding: 24px;
      width: 100%; max-width: 360px;
      text-align: center;
    }
    .modal h3 { font-size: 1.1rem; margin-bottom: 10px; }
    .modal p { color: var(--gray); font-size: .88rem; line-height: 1.6; margin-bottom: 20px; }
    .modal .btn-row { display: flex; gap: 10px; }
    .modal .btn {
      flex: 1; padding: 12px;
      border: none; border-radius: 8px;
      font-size: .95rem; font-weight: 700; cursor: pointer;
    }
    .btn-cancel { background: var(--gray-light); color: #212529; }
    .btn-confirm { background: var(--green); color: #fff; }
  </style>
</head>
<body>

<!-- 로딩 화면 -->
<div id="screen-loading" class="screen-center">
  <div class="spinner"></div>
  <p>정보를 불러오는 중...</p>
</div>

<!-- 오류 화면 -->
<div id="screen-error" class="screen-center" style="display:none">
  <div class="icon">🔒</div>
  <h2>유효하지 않은 링크입니다</h2>
  <p>올바른 주문 링크를 통해 접속해 주세요.<br>문의: 옥수주조</p>
</div>

<!-- 주문 폼 화면 -->
<div id="screen-form" style="display:none">
  <header class="header">
    <h1>🍶 옥수주조 주문</h1>
    <div class="client-name" id="hdr-client"></div>
  </header>

  <div class="notice">
    ⚠️ 재고 상황에 따라 주문이 제한될 수 있습니다.<br>재고 부족 시 별도 안내드립니다.
  </div>

  <div class="container">
    <!-- 품목 목록 -->
    <div class="card">
      <div class="card-title">📦 주문 품목</div>
      <div id="item-list"></div>
    </div>

    <!-- 요청사항 -->
    <div class="card">
      <div class="card-title">💬 요청사항 (선택)</div>
      <textarea id="note" placeholder="배송 관련 요청사항을 입력해 주세요..."></textarea>
    </div>

    <!-- 주문 요약 -->
    <div class="summary-card" id="summary-card">
      <div class="summary-title">🛒 주문 요약</div>
      <div id="summary-body"><div class="summary-empty">선택된 품목이 없습니다</div></div>
    </div>
  </div>

  <!-- 제출 버튼 -->
  <div class="submit-wrap">
    <button class="btn-submit" id="btn-submit" disabled>주문하기</button>
  </div>
</div>

<!-- 확인 모달 -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <h3>주문을 접수하시겠습니까?</h3>
    <p id="modal-body"></p>
    <div class="btn-row">
      <button class="btn btn-cancel" onclick="closeModal()">취소</button>
      <button class="btn btn-confirm" id="modal-confirm">접수하기</button>
    </div>
  </div>
</div>

<!-- 완료 화면 -->
<div id="screen-done" class="screen-center" style="display:none">
  <div class="icon">✅</div>
  <h2>주문이 접수되었습니다!</h2>
  <p id="done-msg">담당자가 확인 후 연락드립니다.</p>
</div>

<script>
  // ── 설정 ──────────────────────────────────────────────
  const WEBAPP_URL = 'https://script.google.com/macros/s/AKfycbxbpnr3MeRL9fpeMDnks3f1rPnD3aFbgPuy77doP7qJsijON0T0sIgCAexqCScKfEh0LA/exec';

  // ── 상태 ──────────────────────────────────────────────
  let client   = null;
  let products = [];
  let stock    = {};

  // ── 초기화 ────────────────────────────────────────────
  async function init() {
    const params = new URLSearchParams(location.search);
    const key    = params.get('key');
    if (!key) return showError();

    try {
      const [cRes, pRes, sRes] = await Promise.all([
        api('clients'), api('products'), api('stock')
      ]);

      const clients = cRes.clients || [];
      client = clients.find(c => c.key === key);
      if (!client) return showError();

      // 재고 맵
      (sRes.stock || []).forEach(s => { stock[s.name] = s.quantity; });

      products = pRes.products || [];
      renderForm();
      show('screen-form');
    } catch (e) {
      showError();
    }
  }

  function show(id) {
    ['screen-loading','screen-error','screen-form','screen-done']
      .forEach(s => document.getElementById(s).style.display = s === id ? '' : 'none');
  }
  function showError() { show('screen-error'); }

  // ── 폼 렌더링 ─────────────────────────────────────────
  function renderForm() {
    document.getElementById('hdr-client').textContent = client.name;

    const list = document.getElementById('item-list');
    list.innerHTML = '';

    products.forEach(p => {
      const qty    = stock[p.name] ?? 0;
      const isOut  = qty === 0;
      const row    = document.createElement('div');
      row.className = 'item-row';
      row.dataset.name = p.name;
      row.dataset.stock = qty;

      row.innerHTML = `
        <div class="item-info">
          <div class="item-name">${p.name}</div>
          <div class="item-stock ${isOut ? 'out' : ''}">
            재고: ${isOut ? '품절' : qty + '개'}
          </div>
          <div class="item-warn" id="warn-${esc(p.name)}"></div>
        </div>
        ${isOut
          ? `<span class="sold-out-badge">품절</span>`
          : `<div class="qty-wrap">
               <button class="qty-btn" onclick="changeQty('${esc(p.name)}',-1)">−</button>
               <input class="qty-input" type="number" id="qty-${esc(p.name)}"
                 value="0" min="0" max="${qty}"
                 oninput="onQtyInput('${esc(p.name)}')" />
               <button class="qty-btn" onclick="changeQty('${esc(p.name)}',1)">+</button>
             </div>`
        }
      `;
      list.appendChild(row);
    });

    updateSummary();
  }

  function esc(s) { return s.replace(/['"&]/g, c => ({'\'':'\\\'','"':'&quot;','&':'&amp;'}[c]||c)); }

  function changeQty(name, delta) {
    const input = document.getElementById('qty-' + name);
    if (!input) return;
    const maxStock = parseInt(input.max);
    let val = (parseInt(input.value) || 0) + delta;
    val = Math.max(0, Math.min(val, maxStock));
    input.value = val;
    onQtyInput(name);
  }

  function onQtyInput(name) {
    const input  = document.getElementById('qty-' + name);
    const warn   = document.getElementById('warn-' + name);
    const maxStock = parseInt(input.max);
    const val    = parseInt(input.value) || 0;

    if (val > maxStock) {
      input.classList.add('over');
      warn.textContent = `재고 부족 (${maxStock}개 남음)`;
    } else {
      input.classList.remove('over');
      warn.textContent = '';
    }
    updateSummary();
  }

  function updateSummary() {
    const items  = getSelectedItems();
    const body   = document.getElementById('summary-body');
    const submit = document.getElementById('btn-submit');
    let hasOver  = false;

    // 초과 여부 체크
    products.forEach(p => {
      const input = document.getElementById('qty-' + p.name);
      if (input && input.classList.contains('over')) hasOver = true;
    });

    if (!items.length) {
      body.innerHTML = '<div class="summary-empty">선택된 품목이 없습니다</div>';
      submit.disabled = true;
    } else {
      body.innerHTML = items.map(i =>
        `<div class="summary-item">• ${i.name} <strong>${i.qty}개</strong></div>`
      ).join('');
      submit.disabled = hasOver;
    }
  }

  function getSelectedItems() {
    return products
      .map(p => {
        const input = document.getElementById('qty-' + p.name);
        const qty   = input ? (parseInt(input.value) || 0) : 0;
        return { name: p.name, qty };
      })
      .filter(i => i.qty > 0);
  }

  // ── 제출 ──────────────────────────────────────────────
  document.getElementById('btn-submit').addEventListener('click', () => {
    const items = getSelectedItems();
    if (!items.length) return;

    const lines = items.map(i => `${i.name} ${i.qty}개`).join(', ');
    document.getElementById('modal-body').textContent = lines;
    document.getElementById('modal').classList.add('open');
  });

  document.getElementById('modal-confirm').addEventListener('click', async () => {
    closeModal();
    const btn = document.getElementById('btn-submit');
    btn.disabled = true;
    btn.textContent = '접수 중...';

    const items = {};
    getSelectedItems().forEach(i => { items[i.name] = i.qty; });

    try {
      const res = await apiPost('submitOrder', {
        clientName: client.name,
        phone:      client.phone,
        address:    client.address,
        items,
        note:       document.getElementById('note').value.trim()
      });

      if (res.error) throw new Error(res.error);

      const insuf = res.insufficientItems || [];
      let msg = '담당자가 확인 후 연락드립니다.';
      if (insuf.length) {
        msg = `일부 품목(${insuf.map(i=>i.name).join(', ')})은 재고가 부족합니다. 담당자가 별도 안내드립니다.`;
      }
      document.getElementById('done-msg').textContent = msg;
      show('screen-done');
    } catch (e) {
      btn.disabled = false;
      btn.textContent = '주문하기';
      alert('오류가 발생했습니다: ' + e.message);
    }
  });

  function closeModal() {
    document.getElementById('modal').classList.remove('open');
  }

  // ── API 헬퍼 ──────────────────────────────────────────
  function api(action) {
    return fetch(`${WEBAPP_URL}?action=${action}`).then(r => r.json());
  }
  function apiPost(action, data) {
    return fetch(`${WEBAPP_URL}?action=${action}`, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain' },
      body: JSON.stringify(data)
    }).then(r => r.json());
  }

  init();
</script>
</body>
</html>
